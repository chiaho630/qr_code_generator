<svg viewBox="0 0 860 620" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13">
  <title>QR Code Generator Architecture Diagram</title>
  <desc>Architecture showing the React client, Express server, SQLite database, in-memory cache, and external flows.</desc>

  <rect width="860" height="620" fill="#f5f0e8" rx="0"/>

  <text x="430" y="18" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1a1a">QR Code Generator — Infrastructure</text>

  <!-- BROWSER -->
  <rect x="30" y="60" width="150" height="64" rx="4" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="30" y="60" width="150" height="22" rx="4" fill="#1a1a1a"/>
  <rect x="30" y="74" width="150" height="12" fill="#1a1a1a"/>
  <text x="105" y="75" text-anchor="middle" font-size="11" font-weight="600" fill="white">BROWSER</text>
  <text x="105" y="97" text-anchor="middle" font-size="11" fill="#555">User / QR Scanner</text>
  <text x="105" y="113" text-anchor="middle" font-size="10" fill="#888">http://localhost:5173</text>

  <!-- REACT CLIENT -->
  <rect x="30" y="165" width="150" height="110" rx="4" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="30" y="165" width="150" height="22" rx="4" fill="#1a1a1a"/>
  <rect x="30" y="179" width="150" height="8" fill="#1a1a1a"/>
  <text x="105" y="180" text-anchor="middle" font-size="11" font-weight="600" fill="white">REACT CLIENT</text>
  <text x="105" y="203" text-anchor="middle" font-size="11" fill="#333">Vite Dev Server</text>
  <text x="105" y="219" text-anchor="middle" font-size="10" fill="#888">port 5173</text>
  <line x1="48" y1="232" x2="162" y2="232" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="105" y="248" text-anchor="middle" font-size="10" fill="#666">Proxy → :8000</text>
  <text x="105" y="264" text-anchor="middle" font-size="10" fill="#888">/api/* · /r/*</text>

  <line x1="105" y1="124" x2="105" y2="165" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="115" y="150" font-size="10" fill="#555">render</text>

  <!-- EXPRESS SERVER -->
  <rect x="225" y="55" width="390" height="420" rx="4" fill="#fefefe" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="225" y="55" width="390" height="24" rx="4" fill="#1a1a1a"/>
  <rect x="225" y="69" width="390" height="10" fill="#1a1a1a"/>
  <text x="420" y="72" text-anchor="middle" font-size="12" font-weight="700" fill="white">EXPRESS SERVER — port 8000</text>

  <rect x="245" y="95" width="350" height="195" rx="3" fill="#f8f6f2" stroke="#999" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="265" y="112" font-size="10" font-weight="700" fill="#777" letter-spacing="1">ROUTES  routes.js</text>

  <rect x="255" y="120" width="152" height="26" rx="3" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="255" y="120" width="38" height="26" rx="3" fill="#22c55e"/>
  <rect x="279" y="120" width="14" height="26" fill="#22c55e"/>
  <text x="274" y="137" text-anchor="middle" font-size="9" font-weight="700" fill="white">POST</text>
  <text x="358" y="137" text-anchor="middle" font-size="10" fill="#333">/api/qr/create</text>

  <rect x="255" y="154" width="152" height="26" rx="3" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="255" y="154" width="32" height="26" rx="3" fill="#3b82f6"/>
  <rect x="275" y="154" width="12" height="26" fill="#3b82f6"/>
  <text x="271" y="171" text-anchor="middle" font-size="9" font-weight="700" fill="white">GET</text>
  <text x="358" y="171" text-anchor="middle" font-size="10" fill="#333">/r/:token → 302</text>

  <rect x="255" y="188" width="152" height="26" rx="3" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="255" y="188" width="32" height="26" rx="3" fill="#3b82f6"/>
  <rect x="275" y="188" width="12" height="26" fill="#3b82f6"/>
  <text x="271" y="205" text-anchor="middle" font-size="9" font-weight="700" fill="white">GET</text>
  <text x="358" y="205" text-anchor="middle" font-size="10" fill="#333">/api/qr/:token</text>

  <rect x="423" y="120" width="162" height="26" rx="3" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="423" y="120" width="40" height="26" rx="3" fill="#f59e0b"/>
  <rect x="449" y="120" width="14" height="26" fill="#f59e0b"/>
  <text x="443" y="137" text-anchor="middle" font-size="9" font-weight="700" fill="white">PATCH</text>
  <text x="521" y="137" text-anchor="middle" font-size="10" fill="#333">/api/qr/:token</text>

  <rect x="423" y="154" width="162" height="26" rx="3" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="423" y="154" width="44" height="26" rx="3" fill="#ef4444"/>
  <rect x="453" y="154" width="14" height="26" fill="#ef4444"/>
  <text x="445" y="171" text-anchor="middle" font-size="9" font-weight="700" fill="white">DELETE</text>
  <text x="514" y="171" text-anchor="middle" font-size="10" fill="#333">/api/qr/:token</text>

  <rect x="423" y="188" width="162" height="26" rx="3" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="423" y="188" width="32" height="26" rx="3" fill="#3b82f6"/>
  <rect x="443" y="188" width="12" height="26" fill="#3b82f6"/>
  <text x="439" y="205" text-anchor="middle" font-size="9" font-weight="700" fill="white">GET</text>
  <text x="511" y="205" text-anchor="middle" font-size="10" fill="#333">/…/:token/image</text>

  <rect x="338" y="223" width="162" height="26" rx="3" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="338" y="223" width="32" height="26" rx="3" fill="#3b82f6"/>
  <rect x="358" y="223" width="12" height="26" fill="#3b82f6"/>
  <text x="354" y="240" text-anchor="middle" font-size="9" font-weight="700" fill="white">GET</text>
  <text x="426" y="240" text-anchor="middle" font-size="10" fill="#333">/…/:token/analytics</text>

  <rect x="245" y="308" width="106" height="56" rx="3" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="298" y="326" text-anchor="middle" font-size="10" font-weight="700" fill="#1a1a1a">tokenGen.js</text>
  <text x="298" y="342" text-anchor="middle" font-size="9" fill="#666">SHA-256 + Base62</text>
  <text x="298" y="356" text-anchor="middle" font-size="9" fill="#666">collision retry</text>

  <rect x="363" y="308" width="110" height="56" rx="3" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="418" y="326" text-anchor="middle" font-size="10" font-weight="700" fill="#1a1a1a">urlValidator.js</text>
  <text x="418" y="342" text-anchor="middle" font-size="9" fill="#666">format · normalize</text>
  <text x="418" y="356" text-anchor="middle" font-size="9" fill="#666">blocklist check</text>

  <rect x="485" y="308" width="110" height="56" rx="3" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="540" y="326" text-anchor="middle" font-size="10" font-weight="700" fill="#1a1a1a">qrcode (npm)</text>
  <text x="540" y="342" text-anchor="middle" font-size="9" fill="#666">generates PNG</text>
  <text x="540" y="356" text-anchor="middle" font-size="9" fill="#666">buffer → response</text>

  <rect x="245" y="384" width="350" height="46" rx="3" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="420" y="402" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">In-Memory Redirect Cache (Map)</text>
  <text x="420" y="418" text-anchor="middle" font-size="10" fill="#92400e">token → original URL — invalidated on update/delete</text>

  <!-- SQLITE -->
  <rect x="660" y="55" width="170" height="210" rx="4" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="660" y="55" width="170" height="24" rx="4" fill="#1a1a1a"/>
  <rect x="660" y="69" width="170" height="10" fill="#1a1a1a"/>
  <text x="745" y="72" text-anchor="middle" font-size="12" font-weight="700" fill="white">SQLITE DB</text>

  <rect x="674" y="92" width="142" height="80" rx="3" fill="#f8f6f2" stroke="#999" stroke-width="1"/>
  <text x="745" y="108" text-anchor="middle" font-size="10" font-weight="700" fill="#333">url_mappings</text>
  <text x="682" y="122" font-size="9" fill="#555">token  TEXT UNIQUE</text>
  <text x="682" y="135" font-size="9" fill="#555">original_url  TEXT</text>
  <text x="682" y="148" font-size="9" fill="#555">expires_at · is_deleted</text>
  <text x="682" y="161" font-size="9" fill="#888">created_at · updated_at</text>

  <rect x="674" y="183" width="142" height="68" rx="3" fill="#f8f6f2" stroke="#999" stroke-width="1"/>
  <text x="745" y="199" text-anchor="middle" font-size="10" font-weight="700" fill="#333">scan_events</text>
  <text x="682" y="213" font-size="9" fill="#555">token  TEXT</text>
  <text x="682" y="226" font-size="9" fill="#555">scanned_at  TEXT</text>
  <text x="682" y="239" font-size="9" fill="#555">user_agent · ip_address</text>

  <!-- EXTERNAL TARGET -->
  <rect x="660" y="300" width="170" height="52" rx="4" fill="white" stroke="#1a1a1a" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="745" y="322" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1a1a">Original URL</text>
  <text x="745" y="339" text-anchor="middle" font-size="10" fill="#888">external destination</text>

  <!-- ARROWS -->
  <line x1="180" y1="200" x2="225" y2="200" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="196" y="193" font-size="9" fill="#555">API calls</text>

  <line x1="615" y1="160" x2="660" y2="160" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="622" y="153" font-size="9" fill="#555">read/write</text>

  <path d="M 105 60 Q 105 38 430 38 Q 745 38 745 300" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowBlue)"/>
  <text x="430" y="52" text-anchor="middle" font-size="10" fill="#3b82f6">302 redirect (scan flow)</text>

  <!-- LEGEND -->
  <rect x="30" y="560" width="800" height="46" rx="3" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="46" y="577" font-size="10" font-weight="700" fill="#333">Legend</text>
  <rect x="95" y="567" width="24" height="12" rx="2" fill="#22c55e"/>
  <text x="124" y="577" font-size="10" fill="#555">POST</text>
  <rect x="162" y="567" width="24" height="12" rx="2" fill="#3b82f6"/>
  <text x="191" y="577" font-size="10" fill="#555">GET</text>
  <rect x="225" y="567" width="24" height="12" rx="2" fill="#f59e0b"/>
  <text x="254" y="577" font-size="10" fill="#555">PATCH</text>
  <rect x="301" y="567" width="24" height="12" rx="2" fill="#ef4444"/>
  <text x="330" y="577" font-size="10" fill="#555">DELETE</text>
  <line x1="393" y1="573" x2="420" y2="573" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="426" y="577" font-size="10" fill="#555">data flow</text>
  <line x1="510" y1="573" x2="537" y2="573" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowBlue)"/>
  <text x="543" y="577" font-size="10" fill="#555">redirect flow</text>
  <rect x="628" y="567" width="24" height="12" rx="2" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="657" y="577" font-size="10" fill="#555">in-memory cache</text>
  <text x="46" y="597" font-size="9" fill="#888">Vite dev server proxies /api/* and /r/* → Express, so the browser never calls :8000 directly in dev.</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1a1a1a"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
  </defs>
</svg>
